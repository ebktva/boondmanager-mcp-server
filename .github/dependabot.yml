version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "fauguste"
    labels:
      - "dependencies"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "fauguste"
    labels:
      - "ci"
    groups:
      # Single PR for all action bumps — sub-actions sharing a repo
      # (github/codeql-action/init|autobuild|analyze) must move together,
      # otherwise CodeQL fails on a version mismatch.
      github-actions:
        patterns:
          - "*"

  # Docker base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "fauguste"
    labels:
      - "dependencies"
      - "docker"
