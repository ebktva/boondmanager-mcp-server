name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Validate MCPB manifest
        if: matrix.node-version == 22
        run: npx --yes @anthropic-ai/mcpb@2.1.2 validate .

      - name: Check tool catalogue is up to date
        # If a tool/prompt/resource was added or renamed, TOOLS.md must be
        # regenerated and committed. This step fails if it drifts.
        if: matrix.node-version == 22
        run: node scripts/generate-tools-catalog.mjs --check

      - name: Verify version consistency
        if: matrix.node-version == 22
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          SERVER_VERSION=$(node -p "require('./server.json').version")
          echo "package.json:  $PKG_VERSION"
          echo "manifest.json: $MANIFEST_VERSION"
          echo "server.json:   $SERVER_VERSION"
          if [ "$PKG_VERSION" != "$MANIFEST_VERSION" ] || [ "$PKG_VERSION" != "$SERVER_VERSION" ]; then
            echo "ERROR: Version mismatch between package.json, manifest.json and server.json"
            exit 1
          fi

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage/
